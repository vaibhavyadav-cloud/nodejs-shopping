name: Node.js Docker CI/CD

on:
  push:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test || true

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} << EOF
            cd ~/nodejs-shopping
            git pull origin master
            docker stop shopping-container || true
            docker rm shopping-container || true
            docker build --no-cache -t shopping-app .
            docker run -d \
              -p 3000:3000 \
              --name shopping-container \
              -e MONGO_USER=${{ secrets.MONGO_USER }} \
              -e MONGO_PWD=${{ secrets.MONGO_PWD }} \
              -e MONGO_DB=shop \
              shopping-app
          EOF